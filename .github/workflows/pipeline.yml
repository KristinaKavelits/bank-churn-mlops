name: Bank Churn MLOps Pipeline

on:
  workflow_dispatch:
    inputs:
      batch_file:
        description: 'Path to the batch CSV file to process'
        required: true
        default: 'data/batch_1.csv'

jobs:
  monitor_job:
    name: Validation & Monitoring
    runs-on: ubuntu-latest
    outputs:
      RETRAIN_REQUIRED: ${{ steps.decisioner.outputs.RETRAIN_REQUIRED }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y libgomp1

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Data Validation (Layer 1 & 2)
        run: |
          echo "Running validation on ${{ github.event.inputs.batch_file }}..."
          python src/validation.py --ref data/reference.csv --current ${{ github.event.inputs.batch_file }}

      - name: Run Monitoring (Drift & Performance)
        run: |
          echo "Running monitoring on ${{ github.event.inputs.batch_file }}..."
          python src/monitor.py --ref data/reference_with_predictions.csv --current ${{ github.event.inputs.batch_file }}

      - name: The Decisioner (Parse JSON Signal)
        id: decisioner
        run: |
          RETRAIN=$(jq -r '.retrain_required' reports/signal.json)
          echo "RETRAIN_REQUIRED=$RETRAIN" >> $GITHUB_OUTPUT
          echo "Decisioner evaluated signal.json. Retrain Required: $RETRAIN"

      - name: Upload Monitoring Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlops-artifacts-monitor
          path: |
            reports/
            mlruns/
          retention-days: 5

  retrain_and_promote_job:
    name: Retraining & Shadow Deployment
    needs: monitor_job
    if: needs.monitor_job.outputs.RETRAIN_REQUIRED == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y libgomp1

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Monitoring Artifacts
        uses: actions/download-artifact@v4
        with:
          name: mlops-artifacts-monitor
          path: .

      - name: Train Challenger Model (Shadow Deployment)
        run: |
          echo "Training new model on ${{ github.event.inputs.batch_file }}..."
          python src/train.py --retrain ${{ github.event.inputs.batch_file }}

      - name: Evaluate & Promote (The Judge)
        run: |
          echo "Pitting Challenger vs Champion..."
          python src/registry.py

      - name: Upload Final Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlops-artifacts-final
          path: |
            reports/
            mlruns/
            data/reference_with_predictions.csv
          retention-days: 5
